{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <div class="card"><h2 style="text-align:center">🔐 Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width:100%">Login</button>
    </form>
    <p style="text-align:center; margin-top:15px">Demo: student / study123</p>
    <p style="text-align:center"><a href="{{ url_for('register') }}">Create account</a></p>
    </div>
</div>
{% endblock %}
